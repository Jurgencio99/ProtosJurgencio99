const canvas=document.getElementById('c'),tip=document.getElementById('tip');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(devicePixelRatio);
const scene=new THREE.Scene(); scene.background=new THREE.Color(0xffffff);
const camera=new THREE.PerspectiveCamera(55,2,1,40000);
camera.position.set(500,150,750);
const controls=new OrbitControls(camera,canvas);
controls.target.set(0,-180,0); controls.autoRotate=true; controls.autoRotateSpeed=.6;
scene.add(new THREE.HemisphereLight(0xffffff,0xdddddd,1.1));
const dir=new THREE.DirectionalLight(0xffffff,1.1); dir.position.set(500,800,300); scene.add(dir);

// ── basemap ground: textured quads — source × style + label overlay ──
const loader=new THREE.TextureLoader(); loader.setCrossOrigin('anonymous');
const groups={}, baseMats=[], op=document.getElementById('op');
function buildLayer(key,tpl,y,isBase){
 const grp=new THREE.Group(); grp.visible=false; scene.add(grp); groups[key]=grp;
 D.tiles.forEach(t=>{
  const [sw,se,ne,nw]=t.c;
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(new Float32Array([
    sw[0],y,sw[1], se[0],y,se[1], ne[0],y,ne[1], nw[0],y,nw[1]]),3));
  g.setIndex([0,2,1, 0,3,2]);
  g.setAttribute('uv',new THREE.BufferAttribute(new Float32Array([0,0, 1,0, 1,1, 0,1]),2));
  g.computeVertexNormals();
  loader.load(tpl.replace('{z}',t.z).replace('{y}',t.y).replace('{x}',t.x),
   tex=>{tex.colorSpace=THREE.SRGBColorSpace;
    const m=new THREE.MeshLambertMaterial({map:tex,transparent:true,
      opacity:isBase?op.value/100:1,side:THREE.DoubleSide});
    if(isBase) baseMats.push(m);
    grp.add(new THREE.Mesh(g,m));},undefined,()=>{});
 });
}
const ui={src:'global',style:'off',labels:false};
function refreshBasemap(){
 Object.values(groups).forEach(g=>g.visible=false);
 const bm=D.basemaps.find(b=>b.id===ui.src);
 if(ui.style!=='off'&&bm[ui.style]){
  const k=ui.src+':'+ui.style;
  if(!groups[k]) buildLayer(k,bm[ui.style],0,true);
  groups[k].visible=true;}
 if(ui.labels&&bm.labels){
  const k=ui.src+':labels';
  if(!groups[k]) buildLayer(k,bm.labels,1.5,false);
  groups[k].visible=true;}
 document.getElementById('attr').textContent=
  ((ui.style!=='off'||ui.labels)?bm.attr+' · ':'')+'Tenure © State of Queensland';
}
// faint fallback plane just below the tiles
const ground=new THREE.Mesh(new THREE.PlaneGeometry(13000,13000),
 new THREE.MeshLambertMaterial({color:0xEDF2ED,transparent:true,opacity:.25,side:THREE.DoubleSide}));
ground.rotation.x=-Math.PI/2; ground.position.y=-2; scene.add(ground);

// ── tenement boundaries + AOI ──
function ring(coords,color,dashed,y){
 const pts=coords.map(p=>new THREE.Vector3(p[0],y,p[2]));
 const g=new THREE.BufferGeometry().setFromPoints(pts);
 const m=dashed?new THREE.LineDashedMaterial({color,dashSize:60,gapSize:40})
               :new THREE.LineBasicMaterial({color});
 const l=new THREE.Line(g,m); if(dashed) l.computeLineDistances(); scene.add(l);}
D.rings.forEach(r=>ring(r,0xD9A441,false,3));
if(D.aoi.length) ring(D.aoi,0xFF6B35,true,3);

// ── text sprites (permit labels, north arrow) ──
function textSprite(txt,color,outline){
 const m=document.createElement('canvas').getContext('2d');
 m.font='bold 48px sans-serif';
 const w=Math.ceil(m.measureText(txt).width);
 const c=document.createElement('canvas'); c.width=w+28; c.height=72;
 const x=c.getContext('2d'); x.font='bold 48px sans-serif';
 x.lineWidth=9; x.strokeStyle=outline; x.strokeText(txt,14,52);
 x.fillStyle=color; x.fillText(txt,14,52);
 const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true,depthTest:false}));
 s.scale.set(c.width*1.6,c.height*1.6,1);
 return s;}
D.labels.forEach(L=>{const s=textSprite(L.t,'#FFD978','#16202E');
 s.position.set(L.p[0],60,L.p[2]); scene.add(s);});
const north=textSprite('N','#16202E','#FFFFFF'); north.position.set(0,120,-5600); scene.add(north);

// ── drill tubes ──
const picks=[];
function tube(a,b,radius,color,info){
 const va=new THREE.Vector3(...a), vb=new THREE.Vector3(...b);
 const d=new THREE.Vector3().subVectors(vb,va), len=Math.max(d.length(),1);
 const mesh=new THREE.Mesh(new THREE.CylinderGeometry(radius,radius,len,12),
   new THREE.MeshLambertMaterial({color}));
 mesh.position.copy(va).addScaledVector(d,.5);
 mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),d.clone().normalize());
 if(info){mesh.userData.info=info;picks.push(mesh);} scene.add(mesh);}
const cuColor=cu=>cu>=4?0xDC2626:cu>=1?0xF59E0B:0x14B8A6;
D.traces.forEach(t=>tube(t.a,t.b,2.5,0x9CA3AF,t.id+' — trace'));
D.intervals.forEach(i=>tube(i.a,i.b,8,cuColor(i.cu),i.label));
D.collars.forEach(c=>tube([c.p[0],c.p[1]+5,c.p[2]],[c.p[0],c.p[1]-5,c.p[2]],10,0x16202E,
 c.id+' · TD '+c.depth+' m · source: '+c.src));

// ── interactions ──
const ray=new THREE.Raycaster(),mouse=new THREE.Vector2();
addEventListener('pointermove',e=>{
 mouse.set(e.clientX/innerWidth*2-1,-(e.clientY/innerHeight)*2+1);
 ray.setFromCamera(mouse,camera);
 const hit=ray.intersectObjects(picks)[0];
 if(hit){tip.style.display='block';tip.style.left=(e.clientX+14)+'px';
   tip.style.top=(e.clientY+14)+'px';tip.textContent=hit.object.userData.info;}
 else tip.style.display='none';});
document.getElementById('rot').onchange=e=>controls.autoRotate=e.target.checked;
document.querySelectorAll('input[name=src]').forEach(r=>r.onchange=e=>{ui.src=e.target.value;refreshBasemap();});
document.querySelectorAll('input[name=style]').forEach(r=>r.onchange=e=>{ui.style=e.target.value;refreshBasemap();});
document.getElementById('lab').onchange=e=>{ui.labels=e.target.checked;refreshBasemap();};
op.oninput=e=>baseMats.forEach(m=>m.opacity=e.target.value/100);
refreshBasemap();

function resize(){const w=canvas.clientWidth,h=canvas.clientHeight;
 if(canvas.width!==w||canvas.height!==h){renderer.setSize(w,h,false);
  camera.aspect=w/h;camera.updateProjectionMatrix();}}
(function loop(){resize();controls.update();renderer.render(scene,camera);
 requestAnimationFrame(loop);})();
</script></body></html>
